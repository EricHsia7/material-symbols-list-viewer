<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Symbols List Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0..1,0&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="css_gallery_field">
      <div class="css_gallery_body"></div>
      <div class="css_gallery_head">
        <div class="css_gallery_head_button_left">
          <span class="css_material_symbols_rounded">bookmark_added</span>
        </div>
        <div class="css_gallery_head_title"></div>
        <div class="css_gallery_head_button_right">
          <span class="css_material_symbols_rounded">search</span>
        </div>
      </div>
    </div>
    <div class="css_search_field"></div>
    <div class="css_symbol_field"></div>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        viewer.initialize();
      });
      window.addEventListener('load', function () {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./service-worker.js').then((registration) => {
            registration.update();
          });
        }
      });
    </script>
  </body>
</html>
