<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Material Symbols List Viewer</title>
    <meta name="viewport" content="viewport-fit=cover, width=device-width, height=device-height, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Symbols" />
    <link rel="manifest" href="./manifest.json" />
    <link href="./icons/512x512-solid.png" sizes="512x512" rel="apple-touch-icon" />
    <link type="image/png" href="./icons/64x64.png" size="64x64" rel="icon" />
    <link type="image/png" href="./icons/128x128.png" size="128x128" rel="icon" />
    <link type="image/png" href="./icons/256x256.png" size="256x256" rel="icon" />
    <link type="image/png" href="./icons/512x512.png" size="512x512" rel="icon" />
    <link type="image/x-icon" href="./icons/256x256.ico" size="256x256" rel="icon" />
    <link type="image/png" href="./icons/64x64.png" size="64x64" rel="bookmark" />
    <link type="image/png" href="./icons/128x128.png" size="128x128" rel="bookmark" />
    <link type="image/png" href="./icons/256x256.png" size="256x256" rel="bookmark" />
    <link type="image/png" href="./icons/512x512.png" size="512x512" rel="bookmark" />
    <link type="image/x-icon" href="./icons/256x256.ico" size="256x256" rel="bookmark" />
    <link type="image/png" href="./icons/64x64.png" size="64x64" rel="shortcut icon" />
    <link type="image/png" href="./icons/128x128.png" size="128x128" rel="shortcut icon" />
    <link type="image/png" href="./icons/256x256.png" size="256x256" rel="shortcut icon" />
    <link type="image/png" href="./icons/512x512.png" size="512x512" rel="shortcut icon" />
    <link type="image/x-icon" href="./icons/256x256.ico" size="256x256" rel="shortcut icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,300,0..1,0&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="css_symbol_section">
      <div class="css_symbol_stage">
        <div class="css_symbol_glyph">
          <span class="css_material_symbols_rounded"></span>
        </div>
      </div>
      <div class="css_symbol_info">
        <div class="css_symbol_info_category"></div>
        <div class="css_symbol_info_name"></div>
        <div class="css_symbol_info_description"></div>
        <div class="css_symbol_info_keywords"></div>
        <div class="css_symbol_info_actions">
          <div class="css_symbol_info_action"><span class="css_material_symbols_rounded">content_copy</span>Copy</div>
          <div class="css_symbol_info_action"><span class="css_material_symbols_rounded">autorenew</span>Shuffle</div>
          <div class="css_symbol_info_action"><span class="css_material_symbols_rounded">link</span>Link</div>
        </div>
      </div>
    </div>

    <div class="css_related_symbols_section">
      <div class="css_related_symbol_head">
        <div class="css_related_symbol_title">Related Symbols</div>
        <div class="css_related_symbol_view_control">
          <div class="css_related_symbol_view_control_button">
            <div class="css_related_symbol_view_control_button_icon"><span class="css_material_symbols_rounded">grid_view</span></div>
            <div class="css_related_symbol_view_control_button_name">Grid</div>
          </div>
          <div class="css_related_symbol_view_control_button">
            <div class="css_related_symbol_view_control_button_icon"><span class="css_material_symbols_rounded">list</span></div>
            <div class="css_related_symbol_view_control_button_name">List</div>
          </div>
        </div>
      </div>
      <div class="css_related_symbol_body"></div>
    </div>

    <div class="css_head"></div>

    <script>
      document.addEventListener('DOMContentLoaded', function () {
        app.initialize();
      });
      window.addEventListener('load', function () {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./service-worker.js').then((registration) => {
            registration.update();
          });
        }
      });
    </script>
  </body>
</html>
